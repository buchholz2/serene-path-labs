services:
  api:
    container_name: site-arnaldo-api
    build:
      context: .
      dockerfile: Dockerfile.api
    image: site-arnaldo-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    container_name: site-arnaldo-web
    build:
      context: .
      dockerfile: Dockerfile
    image: site-arnaldo-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
